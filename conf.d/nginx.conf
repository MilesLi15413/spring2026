user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;
include /etc/nginx/conf.d/stream.conf;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # --- Rate limiting zones ---
    limit_req_zone  $binary_remote_addr zone=general:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # --- Block known bad IPs ---
    geo $bad_ip {
        default         0;
        193.32.162.28   1;
    }

    # --- Upstream keepalive pools ---
    upstream next_app {
        server next-app:3000;
        keepalive 32;
    }
    upstream account_svc {
        server account-service:3000;
        keepalive 16;
    }
    upstream apply_svc {
        server apply-service:3000;
        keepalive 16;
    }
    upstream qr_svc {
        server qr-service:3000;
        keepalive 16;
    }
    upstream outreach_svc {
        server outreach-service:3000;
        keepalive 16;
    }
    upstream rabbitmq_mgmt {
        server rabbitmq:15672;
        keepalive 8;
    }

    include /etc/nginx/conf.d/site.conf;
    include /etc/nginx/conf.d/minio-site.conf;
    include /etc/nginx/conf.d/planka-site.conf;
}